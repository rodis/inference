name: CI

# On pull requests, run the shared checks. On pushes to main the SAME checks run as a gate
# inside publish-images.yml (deploy is blocked if they fail), so there's no push trigger here
# — that avoids running the suite twice per push.
on:
  pull_request:
  workflow_dispatch:

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  checks:
    uses: ./.github/workflows/_ci-checks.yml
