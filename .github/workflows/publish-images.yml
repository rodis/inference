name: Publish worker images

on:
  push:
    branches: [main]
    paths-ignore:
      - 'deploy/**'
  workflow_dispatch:

concurrency:
  group: publish-images-${{ github.ref }}
  cancel-in-progress: false

jobs:
  discover:
    runs-on: ubuntu-latest
    outputs:
      workers: ${{ steps.find.outputs.workers }}
    steps:
      - uses: actions/checkout@v4

      - id: find
        name: Discover workers with a Dockerfile
        run: |
          set -euo pipefail
          workers=$(
            find workers -mindepth 2 -maxdepth 2 -name Dockerfile \
              | jq -R -s -c 'split("\n") | map(select(length>0) | split("/")[1])'
          )
          if [ "$workers" = "[]" ]; then
            echo "::error::No workers/<name>/Dockerfile found"
            exit 1
          fi
          echo "workers=$workers" >> "$GITHUB_OUTPUT"
          echo "Discovered: $workers"

  build-push:
    needs: discover
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
    strategy:
      fail-fast: false
      matrix:
        worker: ${{ fromJson(needs.discover.outputs.workers) }}
    steps:
      - uses: actions/checkout@v4

      - uses: docker/setup-buildx-action@v3

      - uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - id: slug
        name: Slugify worker name for image tag
        env:
          WORKER: ${{ matrix.worker }}
        run: echo "name=${WORKER//_/-}" >> "$GITHUB_OUTPUT"

      - id: meta
        uses: docker/metadata-action@v5
        with:
          images: ghcr.io/${{ github.repository_owner }}/inference-${{ steps.slug.outputs.name }}
          tags: |
            type=raw,value=latest
            type=sha,format=short

      - uses: docker/build-push-action@v6
        with:
          context: .
          file: workers/${{ matrix.worker }}/Dockerfile
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

  bump-manifests:
    needs: [discover, build-push]
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}
          ref: main

      - name: Bump image tags in deploy/
        env:
          WORKERS: ${{ needs.discover.outputs.workers }}
          SHA: ${{ github.sha }}
        run: |
          set -euo pipefail
          short="${SHA:0:7}"
          echo "$WORKERS" | jq -r '.[]' | while read -r worker; do
            slug="${worker//_/-}"
            values="deploy/kustomize/base/${slug}/values.yml"
            if [ ! -f "$values" ]; then
              echo "::warning::No manifest for $worker at $values, skipping"
              continue
            fi
            yq -i ".deployment.image.tag = \"sha-${short}\"" "$values"
            echo "Bumped $values -> sha-${short}"
          done

      - name: Commit and push
        run: |
          set -euo pipefail
          if git diff --quiet -- deploy/; then
            echo "No manifest changes to commit"
            exit 0
          fi
          git config user.name  "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add deploy/
          git commit -m "chore(deploy): bump image tags to sha-${GITHUB_SHA:0:7}"
          git push origin HEAD:main
