name: Publish worker images

on:
  push:
    branches: [main]
  workflow_dispatch:

jobs:
  discover:
    runs-on: ubuntu-latest
    outputs:
      workers: ${{ steps.find.outputs.workers }}
    steps:
      - uses: actions/checkout@v4

      - id: find
        name: Discover workers with a Dockerfile
        run: |
          set -euo pipefail
          workers=$(
            find workers -mindepth 2 -maxdepth 2 -name Dockerfile \
              | jq -R -s -c 'split("\n") | map(select(length>0) | split("/")[1])'
          )
          if [ "$workers" = "[]" ]; then
            echo "::error::No workers/<name>/Dockerfile found"
            exit 1
          fi
          echo "workers=$workers" >> "$GITHUB_OUTPUT"
          echo "Discovered: $workers"

  build-push:
    needs: discover
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
    strategy:
      fail-fast: false
      matrix:
        worker: ${{ fromJson(needs.discover.outputs.workers) }}
    steps:
      - uses: actions/checkout@v4

      - uses: docker/setup-buildx-action@v3

      - uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - id: meta
        uses: docker/metadata-action@v5
        with:
          images: ghcr.io/${{ github.repository_owner }}/inference-${{ matrix.worker }}
          tags: |
            type=raw,value=latest
            type=sha,format=short

      - uses: docker/build-push-action@v6
        with:
          context: .
          file: workers/${{ matrix.worker }}/Dockerfile
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=gha
          cache-to: type=gha,mode=max
