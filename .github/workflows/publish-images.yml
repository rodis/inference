name: Publish worker images

on:
  push:
    branches: [main]
    paths-ignore:
      - 'deploy/**'
  workflow_dispatch:

concurrency:
  group: publish-images-${{ github.ref }}
  cancel-in-progress: false

jobs:
  discover:
    runs-on: ubuntu-latest
    outputs:
      components: ${{ steps.find.outputs.components }}
    steps:
      - uses: actions/checkout@v4

      - id: find
        name: Discover buildable components
        run: |
          set -euo pipefail
          # Auto-discovered workers: workers/<name>/Dockerfile, built from the repo root,
          # image inference-<slug>, manifest deploy/inference/kustomize/base/<slug>/values.yml.
          workers=$(
            find workers -mindepth 2 -maxdepth 2 -name Dockerfile \
              | jq -R -s -c '
                  split("\n") | map(select(length>0) | split("/")[1])
                  | map(. as $w | ($w | gsub("_";"-")) as $slug | {
                      name: $w,
                      dockerfile: ("workers/" + $w + "/Dockerfile"),
                      context: ".",
                      image: ("inference-" + $slug),
                      values: ("deploy/inference/kustomize/base/" + $slug + "/values.yml")
                    })'
          )
          # The dashboard lives outside workers/ (own dir + own deploy path), so it's
          # declared explicitly rather than auto-discovered.
          dashboard='[{"name":"dashboard","dockerfile":"dashboard/Dockerfile","context":"dashboard","image":"inference-dashboard","values":"deploy/dashboard/kustomize/base/values.yml"}]'
          components=$(jq -c -n --argjson w "$workers" --argjson d "$dashboard" '$w + $d')
          if [ "$components" = "[]" ]; then
            echo "::error::No buildable components found"
            exit 1
          fi
          echo "components=$components" >> "$GITHUB_OUTPUT"
          echo "Discovered: $components"

  build-push:
    needs: discover
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
    strategy:
      fail-fast: false
      matrix:
        component: ${{ fromJson(needs.discover.outputs.components) }}
    steps:
      - uses: actions/checkout@v4

      - uses: docker/setup-buildx-action@v3

      - uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - id: meta
        uses: docker/metadata-action@v5
        with:
          images: ghcr.io/${{ github.repository_owner }}/${{ matrix.component.image }}
          tags: |
            type=raw,value=latest
            type=sha,format=short

      - uses: docker/build-push-action@v6
        with:
          context: ${{ matrix.component.context }}
          file: ${{ matrix.component.dockerfile }}
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

  bump-manifests:
    needs: [discover, build-push]
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}
          ref: main

      - name: Bump image tags in deploy/
        env:
          COMPONENTS: ${{ needs.discover.outputs.components }}
          SHA: ${{ github.sha }}
        run: |
          set -euo pipefail
          short="${SHA:0:7}"
          echo "$COMPONENTS" | jq -c '.[]' | while read -r c; do
            name=$(echo "$c" | jq -r '.name')
            values=$(echo "$c" | jq -r '.values')
            if [ ! -f "$values" ]; then
              echo "::warning::No manifest for $name at $values, skipping"
              continue
            fi
            yq -i ".deployment.image.tag = \"sha-${short}\"" "$values"
            echo "Bumped $values -> sha-${short}"
          done

      - name: Commit bump and force-push to deploy-state
        run: |
          set -euo pipefail
          git config user.name  "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          if git diff --quiet -- deploy/; then
            # No image actually changed (e.g. re-run on same SHA) — still mirror main to deploy-state
            git push --force origin HEAD:deploy-state
            exit 0
          fi
          git add deploy/
          git commit \
            -m "deploy: image tags @ sha-${GITHUB_SHA:0:7}" \
            --trailer "Code-Commit:${GITHUB_SHA}"
          git push --force origin HEAD:deploy-state
