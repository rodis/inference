deployment:
  image:
    repository: ghcr.io/rodis/inference-runtime
    tag: "sha-c0c6e95" # placeholder; CI bumps this to sha-<short> on deploy-state
    pullPolicy: IfNotPresent
  env:
    KAFKA_BOOTSTRAP_SERVERS:
      valueFrom:
        configMapKeyRef:
          name: inference-worker-config
          key: KAFKA_BOOTSTRAP_SERVERS
    VECTOR_BASE_URL:
      valueFrom:
        configMapKeyRef:
          name: inference-worker-config
          key: VECTOR_BASE_URL
    REDIS_HOST:
      valueFrom:
        secretKeyRef:
          name: redis-credentials
          key: REDIS_HOST
    REDIS_PORT:
      valueFrom:
        secretKeyRef:
          name: redis-credentials
          key: REDIS_PORT
    REDIS_DB:
      valueFrom:
        secretKeyRef:
          name: redis-credentials
          key: REDIS_DB
    REDIS_USERNAME:
      valueFrom:
        secretKeyRef:
          name: redis-credentials
          key: REDIS_USERNAME
    REDIS_PASSWORD:
      valueFrom:
        secretKeyRef:
          name: redis-credentials
          key: REDIS_PASSWORD
  volumes:
    kafka-ssl:
      secret:
        secretName: kafka-ssl-credentials
        items:
          - key: ca-certificate
            path: ca-cert.pem
          - key: access-certificate
            path: access-cert.pem
          - key: access-key
            path: access-key.pem
    # Writable scratch for the Quix runtime's local RocksDB state (ADR 0004). The
    # root filesystem is read-only, so /tmp/quix-state (the image's QUIX_STATE_DIR)
    # needs a real volume. Ephemeral by design — state is recovered from the Kafka
    # changelog on restart/reschedule, consistent with the no-in-cluster-persistence rule.
    quix-state:
      emptyDir: {}
  volumeMounts:
    kafka-ssl:
      mountPath: /etc/kafka/ssl
    quix-state:
      mountPath: /tmp/quix-state
  resources:
    requests:
      cpu: 50m
      memory: 256Mi
    limits:
      # Bumped for the Quix runtime (ADR 0004): RocksDB state + librdkafka use more
      # than the old threaded runtime's 256Mi.
      cpu: 250m
      memory: 512Mi
