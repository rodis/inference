# Distinct from the runtime release: the Stakater chart names all resources after
# applicationName (default "application"), so without this both releases render a
# Service/Deployment named "application" in this namespace and the kustomize build
# collides ("already registered id: Service.v1/application.inference").
applicationName: bmw-cardata

deployment:
  image:
    repository: ghcr.io/rodis/inference-bmw-cardata
    tag: "sha-bootstrap"   # placeholder; CI bumps this to sha-<short> on deploy-state
    pullPolicy: IfNotPresent
  env:
    # BMW creds from the Doppler-synced secret (bmw-cardata-credentials).
    BMW_CLIENT_ID:
      valueFrom:
        secretKeyRef:
          name: bmw-cardata-credentials
          key: BMW_CLIENT_ID
    BMW_REFRESH_TOKEN:
      valueFrom:
        secretKeyRef:
          name: bmw-cardata-credentials
          key: BMW_REFRESH_TOKEN
    BMW_VIN:
      valueFrom:
        secretKeyRef:
          name: bmw-cardata-credentials
          key: BMW_VIN
    BMW_USER_ID:
      valueFrom:
        secretKeyRef:
          name: bmw-cardata-credentials
          key: BMW_USER_ID
    # Same Vector public ingress the rest of the stack uses (POSTs to /sensors/bmw).
    VECTOR_BASE_URL:
      valueFrom:
        configMapKeyRef:
          name: inference-worker-config
          key: VECTOR_BASE_URL
    # Persist the rotating refresh token to Neon (restart-safety). Reuse the namespace's
    # existing Neon secret (same one the runtime + vector use).
    NEON_DATABASE_URL:
      valueFrom:
        secretKeyRef:
          name: neon-credentials-for-vector
          key: NEON_DATABASE_URL
    # TEMPORARY (drive-observation): log every raw stream message incl. unmapped
    # descriptors, to plan new derivations. Remove after the observation drive.
    BMW_DEBUG_LOG_ALL: "true"
  resources:
    requests:
      cpu: 25m
      memory: 96Mi
    limits:
      # Tiny: one MQTT client + periodic HTTP POSTs. No state, no RocksDB.
      cpu: 100m
      memory: 192Mi
