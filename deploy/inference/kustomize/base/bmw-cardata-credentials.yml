apiVersion: secrets.doppler.com/v1alpha1
kind: DopplerSecret
metadata:
  name: bmw-cardata-credentials
  namespace: doppler-operator-system
spec:
  tokenSecret:
    name: doppler-token-secret
    namespace: doppler-operator-system
  project: kafka-aiven-credentials
  config: prd
  # Keep keys verbatim (no nameTransformer) so they match the env names the
  # subscriber reads (BMW_CLIENT_ID, ...). BMW_REFRESH_TOKEN is the bootstrap
  # device-flow token; NOTE it rotates on each hourly refresh — a pod restart
  # re-reads this (possibly stale) value, so long-term 24/7 needs rotation
  # persistence (Neon), tracked as a follow-up. Fine for a monitored run.
  secrets:
    - BMW_CLIENT_ID
    - BMW_REFRESH_TOKEN
    - BMW_VIN
    - BMW_USER_ID
  managedSecret:
    name: bmw-cardata-credentials
    namespace: inference
    type: Opaque
