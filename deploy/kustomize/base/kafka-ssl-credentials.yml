apiVersion: secrets.doppler.com/v1alpha1
kind: DopplerSecret
metadata:
  name: inference-kafka-ssl-credentials
  namespace: doppler-operator-system
spec:
  tokenSecret:
    name: doppler-token-secret
    namespace: doppler-operator-system
  project: kafka-aiven-credentials
  config: prd
  secrets:
    - ACCESS_CERTIFICATE
    - ACCESS_KEY
    - CA_CERTIFICATE
  nameTransformer: lower-kebab
  managedSecret:
    name: kafka-ssl-credentials
    namespace: inference
    type: Opaque
