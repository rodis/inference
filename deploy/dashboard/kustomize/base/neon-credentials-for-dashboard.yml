apiVersion: secrets.doppler.com/v1alpha1
kind: DopplerSecret
metadata:
  name: neon-credentials-for-dashboard
  namespace: doppler-operator-system
spec:
  tokenSecret:
    name: doppler-token-secret
    namespace: doppler-operator-system
  project: kafka-aiven-credentials
  config: prd
  # Same source as neon-credentials-for-vector, but a dashboard-specific managed
  # secret. NEON_DATABASE_URL maps to DATABASE_URL; DASHBOARD_PASSWORD is the shared
  # HTTP Basic credential guarding the public dashboard (one user for now). Both keys
  # must exist in the Doppler kafka-aiven-credentials/prd config or the sync fails.
  secrets:
    - NEON_DATABASE_URL
    - DASHBOARD_PASSWORD
  managedSecret:
    name: neon-credentials-for-dashboard
    namespace: inference
    type: Opaque
