apiVersion: secrets.doppler.com/v1alpha1
kind: DopplerSecret
metadata:
  name: neon-credentials-for-dashboard
  namespace: doppler-operator-system
spec:
  tokenSecret:
    name: doppler-token-secret
    namespace: doppler-operator-system
  project: kafka-aiven-credentials
  config: prd
  # Same source as neon-credentials-for-vector, but a dashboard-specific managed
  # secret. Key stays NEON_DATABASE_URL; the deployment maps it to DATABASE_URL.
  secrets:
    - NEON_DATABASE_URL
  managedSecret:
    name: neon-credentials-for-dashboard
    namespace: inference
    type: Opaque
