generators:
  - helmChart.yml

configMapGenerator:
  - name: vector-config
    namespace: inference
    files:
      - ./configs/vector.yaml
  - name: vector-sources
    namespace: inference
    files:
      - ./configs/sources/http_server_data_in.yml
      - ./configs/sources/kafka_persist.yml
      - ./configs/sources/internal_metrics.yml
  - name: vector-transforms
    namespace: inference
    files:
      - ./configs/transforms/parse_path.yml
      - ./configs/transforms/route_by_domain.yml
      - ./configs/transforms/route_by_app.yml
      - ./configs/transforms/shape_sensor.yml
      - ./configs/transforms/owntracks_to_canonical.yml
      - ./configs/transforms/enrich_sensor.yml
      - ./configs/transforms/shape_for_neon.yml
  - name: vector-sinks
    namespace: inference
    files:
      - ./configs/sinks/console.yml
      - ./configs/sinks/sensor_to_kafka_aiven.yml
      - ./configs/sinks/sensor_to_neon.yml
      - ./configs/sinks/prometheus_exporter.yml

resources:
  # The inference namespace is owned by the inference-runtime app (its
  # namespace.yml) + CreateNamespace=true; Vector just deploys into it.
  - kafka-credentials-for-vector.yml
  - kafka-aiven-credentials-for-vector.yml
  - neon-credentials-for-vector.yml
