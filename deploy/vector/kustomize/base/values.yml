role: "Stateless-Aggregator"
replicas: 1
serviceHeadless:
  enabled: false
ingress:
  enabled: true
  className: nginx
  annotations:
    cert-manager.io/cluster-issuer: letsencrypt-prod
  hosts:
    - host: --placeholder--
      paths:
        - path: /
          pathType: Prefix
          port:
            number: 80
  tls:
    - secretName: vector-tls
      hosts:
        - --placeholder--

service:
  ports:
    - name: http-server
      port: 80
      protocol: TCP
    - name: prom-exporter
      port: 9090
      protocol: TCP
containerPorts:
  - containerPort: 80
    name: http-server
    protocol: TCP
  - containerPort: 9090
    name: prom-exporter
    protocol: TCP

logLevel: "debug"

extraVolumes:
  - name: vector-config
    configMap:
      name: vector-config
  - name: vector-sources
    configMap:
      name: vector-sources
  - name: vector-transforms
    configMap:
      name: vector-transforms
  - name: vector-sinks
    configMap:
      name: vector-sinks
  - name: kafka-aiven-credentials
    secret:
      secretName: kafka-aiven-credentials-for-vector
  - name: neon-credentials
    secret:
      secretName: neon-credentials-for-vector

extraVolumeMounts:
  - name: vector-config
    mountPath: /vector/vector.yaml
    subPath: vector.yaml
  - name: vector-sources
    mountPath: /vector/sources
  - name: vector-transforms
    mountPath: /vector/transforms
  - name: vector-sinks
    mountPath: /vector/sinks
  - name: kafka-aiven-credentials
    mountPath: "/etc/vector/certs"
    readOnly: true
  # Neon creds as files for Vector's `directory` secret backend (vector.yaml secret.neon).
  # Each key becomes a file, so .../neon/NEON_DATABASE_URL holds the connection string.
  - name: neon-credentials
    mountPath: "/etc/vector/secrets/neon"
    readOnly: true

envFrom:
  - secretRef:
      name: kafka-credentials-for-vector
  # neon-credentials-for-vector is no longer in envFrom: NEON_DATABASE_URL is read via
  # the directory secret backend (mounted above), not ${VAR} interpolation (disabled in 0.57).
  
args:
  - --config-dir
  - "/vector/"

image:
  base: "debian"