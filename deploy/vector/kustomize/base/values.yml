role: "Stateless-Aggregator"
replicas: 1
serviceHeadless:
  enabled: false
ingress:
  enabled: true
  className: nginx
  annotations:
    cert-manager.io/cluster-issuer: letsencrypt-prod
  hosts:
    - host: --placeholder--
      paths:
        - path: /
          pathType: Prefix
          port:
            number: 80
  tls:
    - secretName: vector-tls
      hosts:
        - --placeholder--

service:
  ports:
    - name: http-server
      port: 80
      protocol: TCP
containerPorts:
  - containerPort: 80
    name: http-server
    protocol: TCP
    
logLevel: "debug"

extraVolumes:
  - name: vector-config
    configMap:
      name: vector-config
  - name: vector-sources
    configMap:
      name: vector-sources
  - name: vector-transforms
    configMap:
      name: vector-transforms
  - name: vector-sinks
    configMap:
      name: vector-sinks
  - name: kafka-aiven-credentials
    secret:
      secretName: kafka-aiven-credentials-for-vector

extraVolumeMounts:
  - name: vector-config
    mountPath: /vector/vector.yaml
    subPath: vector.yaml
  - name: vector-sources
    mountPath: /vector/sources
  - name: vector-transforms
    mountPath: /vector/transforms
  - name: vector-sinks
    mountPath: /vector/sinks
  - name: kafka-aiven-credentials
    mountPath: "/etc/vector/certs"
    readOnly: true

envFrom:
  - secretRef:
      name: kafka-credentials-for-vector
  - secretRef:
      name: neon-credentials-for-vector   # must exist before deploy; provides NEON_DATABASE_URL
  
args:
  - --config-dir
  - "/vector/"

image:
  base: "debian"