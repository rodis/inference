apiVersion: secrets.doppler.com/v1alpha1
kind: DopplerSecret
metadata:
  name: pushcut-credentials-for-vector
  namespace: doppler-operator-system
spec:
  tokenSecret:
    name: doppler-token-secret
    namespace: doppler-operator-system
  project: kafka-aiven-credentials
  config: prd
  # No nameTransformer: keep the key as PUSHCUT_WEBHOOK_URL so it matches the
  # ${PUSHCUT_WEBHOOK_URL} interpolation in the http sink and the envFrom.
  # Value is the full Pushcut notification URL, secret token and all.
  secrets:
    - PUSHCUT_WEBHOOK_URL
  managedSecret:
    name: pushcut-credentials-for-vector
    namespace: inference
    type: Opaque
