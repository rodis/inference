apiVersion: secrets.doppler.com/v1alpha1
kind: DopplerSecret
metadata:
  name: neon-credentials-for-vector
  namespace: doppler-operator-system
spec:
  tokenSecret:
    name: doppler-token-secret
    namespace: doppler-operator-system
  project: kafka-aiven-credentials
  config: prd
  # No nameTransformer: keep the key as NEON_DATABASE_URL so it matches the
  # ${NEON_DATABASE_URL} interpolation in the postgres sink and the envFrom.
  secrets:
    - NEON_DATABASE_URL
  managedSecret:
    name: neon-credentials-for-vector
    namespace: vector
    type: Opaque
