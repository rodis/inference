type: remap
inputs:
  - kafka_persist
source: |
  # The stable id lives inside the message now (no top-level envelope wrapper). Hoist
  # it to a top-level field so the postgres sink maps it to the events.id PK column.
  # Never persist an event without it — it's the PK.
  if !exists(.message.id) {
      abort
  }
  .id = .message.id

  # event_class: the worker's inference output carries a top-level inference_type;
  # raw producer events do not.
  .event_class = "raw"
  if exists(.inference_type) {
      .event_class = "derived"
  }

  # Drop source_type: the kafka source stamps its own metadata value ("kafka") on
  # every decoded event, clobbering the envelope's value, so the column was uniformly
  # "kafka" and useless. event_class (raw/derived) + source_app already carry the
  # signal. (Neon column dropped to match.)
  del(.source_type)

  # occurred_at + ingested_at are set DB-side by the events BEFORE INSERT trigger,
  # so this transform stays minimal (no timestamp math in VRL).
