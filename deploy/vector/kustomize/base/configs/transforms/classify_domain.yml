type: remap
inputs:
  - route_ingest._unmatched   # everything except OwnTracks (which has its own lane)
source: |
  # 1. Path Parsing
  path_str = to_string!(.path)
  clean_path = strip_whitespace(path_str)

  # Initialize path_parts as an empty array to satisfy the compiler
  .path_parts = []

  if length(clean_path) > 1 {
      .path_parts = split(slice!(clean_path, 1), "/")
  }

  # 2. Strict Domain & App Validation
  # We use ?? null to handle the "fallible" nature of the get function
  domain = get(.path_parts, [0]) ?? null
  app = get(.path_parts, [1]) ?? null

  if domain == null || domain == "" {
      log("Rejected: Missing event domain in URL path", level: "error")
      abort
  }

  if app == null || app == "" {
      log("Rejected: Missing source app in URL path", level: "error")
      abort
  }

  .event_domain = domain
  .source_app = app

  # 3. Kafka Topic — optional 3rd path segment, defaults to raw_{domain}s
  topic = get(.path_parts, [2]) ?? null

  if topic == null || topic == "" {
      .kafka_topic = "raw_" + to_string!(domain)
  } else {
      .kafka_topic = topic
  }

  # 4. Payload to Message Swap
  if exists(.payload) {
      .message = del(.payload)
  }

  # 5. Message Standardization
  if .message == null || .message == "" {
      .message = {}
  } else {
      .message = parse_json(.message) ?? .message
  }

  # 6. Strict Event Name Validation. Producers still POST `event_name`; we rename it
  # to the internal field `name` here so every component + the Neon column uses `name`.
  if !is_object(.message) || !exists(.message.event_name) {
      log("Rejected: Missing event_name in payload from app: " + to_string(.source_app) ?? "unknown", level: "error")
      abort
  }
  .message.name = del(.message.event_name)

  # 7. Strict user_id Validation — the inference runtime keys per-user state on
  # message.user_id (ADR 0004). Reject events without it rather than guessing an
  # entity: a missing user_id means the producer is misconfigured. (Note: the
  # http_server source already returned 200 on receipt, so this rejection shows up
  # as a Vector error log + a dropped event, not a 4xx to the caller.)
  if !exists(.message.user_id) {
      log("Rejected: Missing user_id in payload from app: " + (to_string(.source_app) ?? "unknown") + " event: " + (to_string(.message.name) ?? "unknown"), level: "error")
      abort
  }

  # Mirror name to the root (top-level wrapper field + Neon `name` column)
  .name = .message.name