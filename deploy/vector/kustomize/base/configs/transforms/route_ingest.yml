type: route
inputs:
  - http_server_data_in
# Split OwnTracks traffic off BEFORE classify_domain: OwnTracks posts a bare
# _type-tagged body (no {"payload":...}, no event_name), which classify_domain would
# reject. Everything else (sensor POSTs to /sensors/...) falls through to _unmatched
# and continues down the original path unchanged.
#
# Unified URL grammar: every producer is /sensors/<app>/<topic>; the <app> segment
# selects its adapter. OwnTracks is /sensors/owntracks/raw_sensors. The legacy flat
# /owntracks is accepted TRANSITIONALLY so no data drops while the phone is migrated —
# remove that clause once the OwnTracks app URL is on the /sensors/owntracks form.
route:
  owntracks: starts_with(to_string(.path) ?? "", "/sensors/owntracks") || starts_with(to_string(.path) ?? "", "/owntracks")
