type: remap
inputs:
  - route_by_domain.sensor_traffic
source: |
  # Cleanup
  del(.path_parts)
  del(.path)
  del(.event_domain)

  # Envelope identity — sensor traffic only (this transform runs post-routing).
  # Mint a stable UUID per event at ingest if one wasn't supplied. Downstream
  # lineage (derived_from) and persistence (primary key / dedupe) join on this.
  if !exists(.envelope_id) {
      .envelope_id = uuid_v4()
  }

  # Entity key (ADR 0004 goal 1). The runtime keys per-user state on .message.user_id;
  # the iOS Shortcut doesn't send one yet, so default it here. Single-user today → "rods".
  if !is_object(.message) {
      .message = {}
  }
  if !exists(.message.user_id) {
      .message.user_id = "rods"
  }