type: remap
inputs:
  - shape_sensor                  # standard sensor payloads, validated + shaped
  - owntracks_to_canonical        # OwnTracks lane arrives pre-shaped; share id minting + kafka sink
source: |
  # Normalize producer payload keys: some Shortcuts emit trailing/leading spaces
  # (e.g. "amount ", "timestamp ") which create malformed columns and, worse, a NULL
  # occurred_at — the events trigger derives it from message.timestamp, so a stray
  # "timestamp " key means the canonical one is missing. Trim whitespace on every key.
  if is_object(.message) {
      # object!() pins the type so map_keys' closure param is known (else E121: `any`);
      # with a typed object map_keys is infallible, so no `!` (else E620).
      .message = map_keys(object!(.message)) -> |key| { strip_whitespace(key) }
  }

  # Cleanup — drop the parse-only fields so only the canonical wrapper reaches the sink.
  # .event_domain was internal routing state (route_by_domain already consumed it); note
  # .source_app is NOT dropped — it's part of the {name, source_app, source_type, message}
  # wrapper, even though route_by_app also routed on it.
  del(.path_parts)
  del(.path)
  del(.event_domain)
  # Drop the http_server source's ingest `timestamp` (emit-time): it was ~the same
  # instant as the DB-set ingested_at column, which is the authoritative system time.
  # Keeps the wrapper {name, source_app, source_type, message} consistent with derived
  # events (the runtime's to_event emits no produce-time stamp either). Event-time
  # lives in message.timestamp.
  del(.timestamp)

  # Event identity — sensor traffic only (this transform runs post-routing). The id
  # lives INSIDE the message (no top-level "envelope" wrapper anymore): the inference
  # runtime mints message.id for derived events, Vector mints it for raw events here.
  # Mint a stable UUID at ingest if the producer didn't supply one. Downstream lineage
  # (derived_from) and persistence (primary key / dedupe) join on this.
  if !exists(.message.id) {
      .message.id = uuid_v4()
  }