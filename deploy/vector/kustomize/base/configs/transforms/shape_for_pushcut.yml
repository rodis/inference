type: remap
inputs:
  - kafka_persist
# Outbound action lane (the reverse of the OwnTracks ingest lane): turn a chosen
# high_level_event into a Pushcut notification so the phone can run a Shortcut on tap.
# This shares the kafka_persist source with the Neon persister — it's a second, filtered
# consumer of the same stream, not a new Kafka connection.
source: |
  # Fire on ONE event for the first loop, so the phone only buzzes on what we care
  # about. `phone_is_charging` is the easy repeatable test trigger (plug in → unplug).
  # Retarget by changing this name (e.g. "car_trip", "gym_visit").
  if .name != "phone_is_charging" {
      abort
  }

  # Send an EMPTY body: dynamic title/text/input in the POST are Pushcut Pro-only, so a
  # free-tier account rejects them with a "buy Pro" message. An empty object just fires
  # the notification as predefined in the app (its own title/text + the Shortcut it runs).
  # Trade-off: no per-event text and no data passed into the Shortcut (both need Pro).
  . = {}
