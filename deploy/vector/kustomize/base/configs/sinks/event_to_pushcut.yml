type: http
inputs:
  - event_to_pushcut
# Full Pushcut webhook URL (https://api.pushcut.io/<secret>/notifications/<name>),
# injected from a K8s secret — the account secret must not live in git.
uri: "${PUSHCUT_WEBHOOK_URL}"
method: post
encoding:
  codec: json
# CRITICAL: the http sink defaults to a JSON *array* per batch. Pushcut's API wants a
# bare object, so newline_delimited + max_events 1 makes each request a single {...}.
framing:
  method: newline_delimited
batch:
  max_events: 1
  timeout_secs: 1
request:
  headers:
    # Override the ndjson content-type Vector would otherwise set for this framing.
    Content-Type: application/json
# No durability need (WIP, no users): a missed buzz is fine, so drop rather than block
# the shared buffer if Pushcut is unreachable.
buffer:
  type: memory
  max_events: 100
  when_full: drop_newest
healthcheck:
  enabled: false
