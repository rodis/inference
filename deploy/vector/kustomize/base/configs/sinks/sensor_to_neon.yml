type: postgres
inputs:
  - shape_for_neon
# Neon (Postgres) connection string, read via Vector's `directory` secret backend
# (see the `secret.neon` block in vector.yaml + the volume mount in values.yml). Not
# env interpolation: Vector 0.57 disabled ${VAR} by default. Use the pooled endpoint
# with sslmode=require. The secret's NEON_DATABASE_URL file holds the full URL.
endpoint: "SECRET[neon.NEON_DATABASE_URL]"
table: events
healthcheck:
  enabled: true
# Flush the tail row on a 1s timer instead of waiting for the next event — under
# low traffic the batch otherwise sat for many minutes.
batch:
  timeout_secs: 1
# Memory buffer (was disk). No durability need here (WIP, no users); when_full:
# block means a Neon outage applies backpressure and the Kafka offset simply
# doesn't advance until a write succeeds — still no data loss.
buffer:
  type: memory
  max_events: 500
  when_full: block
