type: kafka
inputs:
  - enrich_sensor
bootstrap_servers: "kafka-13776261-aware.l.aivencloud.com:19583"
# Fixed topic — the sensors-domain sink. Destination is chosen by the first-level
# route_by_domain (not a URL segment), so producers can't steer traffic; a new domain
# gets its own subtree ending in its own static-topic sink. enrich_sensor already
# stripped the internal routing field, so the wrapper reaches Kafka clean.
topic: raw_sensors
encoding:
  codec: json
# Flush the producer promptly even under low traffic. The default leaves the tail
# message of a quiet period sitting; 100ms linger keeps delivery near-real-time.
librdkafka_options:
  "queue.buffering.max.ms": "100"
tls:
  enabled: true
  ca_file: "/etc/vector/certs/ca_certificate"
  crt_file: "/etc/vector/certs/access_certificate"
  key_file: "/etc/vector/certs/access_key"

healthcheck:
  enabled: false

# Memory buffer (not disk): the disk buffer's write/flush cadence under low traffic
# was holding the tail event for minutes. No durability need here (WIP, no users);
# when_full: block applies backpressure rather than dropping if Kafka is unreachable.
buffer:
  type: memory
  max_events: 500
  when_full: block