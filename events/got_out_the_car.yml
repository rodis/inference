# Getting out of the car, derived directly from the 3 raw exit signals + a session gate
# (ADR 0005). The old car_door_closed intermediate was dropped (same AND-gate fragility as
# car_door_opened). This is a 2-of-3 over the raw exit signals, PLUS an open-trip gate:
# got_into_the_car latches "a trip is in progress", and while open a single *reliable* exit
# signal can close it (the start entails an end).
#
# Weights are tuned so the gate only trusts the reliable single signal:
#   - device_disconnected_from_carplay (6): CarPlay tracks the car, so a disconnect is a
#     trustworthy exit. 6 + gate(4) = 10 → a CarPlay-disconnect alone closes a known-open trip.
#   - car_lock_state_change (5): direction-ambiguous and SHARED with got_into — 5 + gate(4) = 9,
#     so a lock-change right after entry (gate just opened) can't false-close the trip.
#   - device_disconnected_from_power (5): blips mid-drive when the phone comes off the charger —
#     5 + gate(4) = 9, so a mid-drive unplug can't false-close either.
# Any TWO raw signals still reach 10 with no gate (e.g. CarPlay-disconnect + lock = 11,
# lock + power = 10), so a real arrival fires even when no session is open.
name: got_out_the_car
enabled: true

engine: session_gated_window
engine_config:
  gate_event: got_into_the_car
  gate_weight: 4
  max_open_seconds: 21600   # 6h — a trip open longer than this is stale (mirrors car_trip)
  window_seconds: 600
  threshold: 10
  cooldown_seconds: 600     # 10 min — fires at most once per trip
  weights:
    device_disconnected_from_carplay: 6
    car_lock_state_change: 5
    device_disconnected_from_power: 5

source_topic: raw_sensors
sink_topic: high_level_events
