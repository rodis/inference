# Getting into the car, derived directly from the 3 raw entry signals (ADR 0005). The old
# car_door_opened intermediate was dropped: it hard-required car_lock_state_change AND a
# CarPlay-connect (an AND gate), so a missing lock-change killed the whole chain — observed
# 2026-07-16, when entry fired CarPlay + power but no lock-change, so no trip formed.
#
# Now it's a 2-of-3 over the raw signals: any two agreeing fire it, so no single (flaky)
# signal is mandatory. car_lock_state_change is direction-ambiguous and CarPlay/charger can
# each be absent, but two of them together unambiguously mean "got in". A single signal, or
# an exit (which carries the *disconnect* variants — not counted here), can't reach threshold.
name: got_into_the_car
enabled: true

engine: weighted_window
engine_config:
  threshold: 10
  window_seconds: 600
  cooldown_seconds: 600   # 10 min — fires at most once per trip
  weights:
    device_connected_to_carplay: 5
    car_lock_state_change: 5
    device_connected_to_power: 5

source_topic: raw_sensors
sink_topic: high_level_events
