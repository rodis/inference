# Recursive derivation (ADR 0002/0004): got_into_the_car derives from a RAW event
# (device_connected_to_power) + a DERIVED event (car_door_opened). The derived
# contributor is fed back IN-PROCESS by the runtime's router — NOT re-consumed from
# high_level_events — so the only external source is raw_sensors. Still a DAG:
# nothing derives got_into_the_car, so the cascade terminates.
name: got_into_the_car
enabled: true

engine: weighted_window
engine_config:
  # car_door_opened + device_connected_to_power together mean: opened the door, sat
  # in the driver seat, put the phone on the wireless charger. Equally important.
  threshold: 10
  window_seconds: 600
  cooldown_seconds: 600   # 10 min — fires at most once per trip
  weights:
    car_door_opened: 5
    device_connected_to_power: 5

source_topics: [raw_sensors]
sink_topic: high_level_events
event_domain: sensors
