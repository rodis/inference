# Inference event, defined as data. Loaded by the Quix runtime (ADR 0004).
# `name` is the identity source of truth: the emitted event name (inference_type is the engine type).
name: car_door_closed
enabled: true

# Bayesian (naive-Bayes) engine: accumulate log-odds from a prior; each signal seen in
# the window contributes log(LR). The emitted `score` is a calibrated posterior probability.
engine: naive_bayes_window
engine_config:
  prior: 0.05          # base rate of "door closed / leaving the car"
  threshold: 0.85      # fire at >= 85% posterior
  window_seconds: 600
  cooldown_seconds: 600   # 10 min — fires at most once per trip
  signals:
    # Positive evidence: a lock change + a CarPlay disconnect say you're leaving.
    car_lock_state_change: { lr: 12 }
    device_disconnected_from_carplay: { lr: 12 }
    # NEGATIVE evidence (LR < 1): a CarPlay *connect* in the same window means you just
    # ARRIVED, which argues against a door-close. A weighted sum can't express this; it's
    # what suppressed the bogus morning car_door_closed in replay against real Neon data.
    # (car_door_opened deliberately gets NO symmetric penalty — an arrival genuinely fires
    # both CarPlay signals, and there the *open* is the correct read.)
    device_connected_to_carplay: { lr: 0.05 }

source_topic: raw_sensors
sink_topic: high_level_events
