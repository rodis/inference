# Inference event, defined as data. Loaded by the Quix runtime (ADR 0004).
# `name` is the identity source of truth: the emitted event name (inference_type is the engine type).
# Mirror of car_door_opened, on the disconnect signals (closing/leaving the car).
name: car_door_closed
enabled: true

engine: weighted_window
engine_config:
  # car_lock_state_change + device_disconnected_from_carplay together assert the car
  # door is closed. Equally important: 5 each, threshold 10 → both required in window.
  threshold: 10
  window_seconds: 600
  cooldown_seconds: 600   # 10 min — fires at most once per trip
  weights:
    car_lock_state_change: 5
    device_disconnected_from_carplay: 5

source_topic: raw_sensors
sink_topic: high_level_events
