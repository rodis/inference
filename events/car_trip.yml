# Inference event, defined as data. Loaded by the Quix runtime (ADR 0004).
# `name` is the identity source of truth: the emitted event name (inference_type is the engine type).
name: car_trip
enabled: true

# Session-pairing engine: a trip is the span from getting in to getting out. The engine
# remembers the open got_into_the_car and emits car_trip when got_out_the_car arrives,
# with both as lineage (duration is got_out.timestamp - got_into.timestamp). Both inputs
# are themselves derived; the runtime feeds them back in-process (ADR 0002).
engine: session_window
engine_config:
  start_event: got_into_the_car
  end_event: got_out_the_car
  max_duration_seconds: 21600   # 6h — a got_out beyond this won't pair to a stale start

source_topic: raw_sensors
sink_topic: high_level_events

# It carries an interval capability (start/end derived from its got_into/got_out
# lineage). Whether to present it as a span is a dashboard concern, not declared here.
capabilities: [interval]
