# Inference event, defined as data. Loaded by the Quix runtime (ADR 0004).
# `name` is the identity source of truth: the emitted event name (inference_type is the engine type).
name: gym_visit
enabled: true

# Session-pairing engine: a gym visit is the span from entering to leaving the "Gym"
# waypoint. The zone events are RAW — the OwnTracks Vector lane translates a transition
# to waypoint "Gym" into entered_gym / left_gym (slugified desc). Same shape as car_trip.
# The waypoint MUST be named "Gym" in the OwnTracks app for the slug to match here.
engine: session_window
engine_config:
  start_event: entered_gym
  end_event: left_gym
  max_duration_seconds: 21600   # 6h — a left_gym beyond this won't pair to a stale start

source_topic: raw_sensors
sink_topic: high_level_events

# Carries an interval capability (start/end from its entered_gym/left_gym lineage);
# presenting it as a span is a dashboard concern, not declared here.
capabilities: [interval]
